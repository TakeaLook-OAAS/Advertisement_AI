io:
  width: 1280
  height: 720

display:
  show_window: true
  draw_fps: true
  draw_headpose: true
  draw_gaze: true
  window_name: "AI Demo"
  font_scale: 0.7
  thickness: 2

models:
  yolo:
    model: "yolov8n.pt"      # nano model (~6MB, auto-download)
    conf: 0.5                 # confidence threshold
    device: "cpu"
    classes: [0]              # 0=person in COCO
  tracker:
    iou_threshold: 0.3
    max_lost: 30              # 이 프레임 수만큼 미매칭이면 track 삭제
  headpose:
    enabled: true
    device: "cpu"             # cpu / cuda
    min_face_size: 30         # 최소 얼굴 크기 (pixel). 이보다 작으면 실패 처리
  gaze:
    enabled: false
    model_xml: "models/gaze/ir/gaze.xml"
    device: "CPU"             # OpenVINO device: CPU / GPU / AUTO

logic:
  roi:
    # polygon points in image coordinates (x,y)
    polygon: [[200,200],[1000,200],[1000,650],[200,650]]
  attention:
    # Example thresholds (tune later)
    max_yaw_abs_deg: 25
    max_pitch_abs_deg: 20
