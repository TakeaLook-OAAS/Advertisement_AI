# Dev overrides
device_id: "cam_01"
source: "data/samples/test5.mp4"

display:
  output_video: false
  output_video_path: "data/output/output_test5_official_bytetrack.mp4"
  font_scale: 0.7
  thickness: 2
  draw_bbox: true
  draw_crop_bbox: true
  draw_fps: true
  draw_headpose: true
  draw_gaze: true
  draw_roi: true
  draw_look: true
  draw_gender_age: true

models:
  yolo:
    device: "cpu"
    model: "weights/yolo/yolov8n.pt"      # nano model (~6MB, auto-download)
    conf: 0.5                 # confidence threshold
    classes: [0]              # 0=person in COCO
  tracker:
    iou_threshold: 0.3
    max_lost: 30              # 이 프레임 수만큼 미매칭이면 track 삭제
  face:
    device: "CPU"
    weights: "weights/face_detection/face-detection-adas-0001.xml"
    conf_thresh: 0.5          # confidence threshold
    min_face_size: 30         # 최소 얼굴 크기 (pixel). 이보다 작으면 bbox 그대로 반환
  headpose:
    device: "cpu"             # cpu / cuda
    weights: "weights/headpose/6DRepNet_300W_LP_AFLW2000.pth"  # 가중치 경로
    min_face_size: 30         # 최소 얼굴 크기 (pixel). 이보다 작으면 실패 처리
  eye:
    device: "CPU"
    weights: "weights/eye_detection/facial-landmarks-35-adas-0002.xml"
    min_eye_size: 10
  gaze:
    device: "CPU"
    weights: "weights/gaze/gaze-estimation-adas-0002.xml"
  mivolo:
    device: "cpu"
    model: "weights/age_gender/model_imdb_cross_person_4.22_99.46.pth"
    repo_root: "MiVOLO"
    min_face_size: 20
    min_person_size: 40
    use_persons: true

logic:
  attention:
    threshold_deg: 30.0

output:
  json_dir: "data/output/segments/"
  ad_cycle:
    durations_s: [2, 3, 1]