services:
  ai-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      python -m src.main
      --config ${AI_CONFIG:-configs/dev.yaml}
      --no-window

  ai-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: sleep infinity