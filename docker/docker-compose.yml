name: oaas

services:
  ai-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_prod
    volumes:
      - ..:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      python -m src.main --config ${AI_CONFIG:-configs/dev.yaml} --no-window
    networks:
      - oaas-net

  ai-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_dev
    volumes:
      - ..:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: sleep infinity
    networks:
      - oaas-net

networks:
  oaas-net:
    external: true
